name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint, Type-check, Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install uv
        run: curl -Ls https://astral.sh/uv/install.sh | sh
        shell: bash

      - name: Add uv to PATH
        run: echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Create virtual environment
        run: uv venv .venv --python 3.10

      - name: Install dev dependencies
        run: |
          source .venv/bin/activate
          uv pip install -e ".[dev]"

      - name: Run ruff linter
        run: |
          source .venv/bin/activate
          ruff check src/ scripts/ tests/

      - name: Run mypy type checker
        run: |
          source .venv/bin/activate
          mypy src/ scripts/

      - name: Run unit tests
        run: |
          source .venv/bin/activate
          pytest tests/unit/ -m "not integration" --tb=short -v

      - name: Run diagnostics (CI profile)
        run: |
          source .venv/bin/activate
          python scripts/diagnose.py --profile ci || true
          # Allow WARN/FAIL for CARLA (not available in CI) — exit 0 always
