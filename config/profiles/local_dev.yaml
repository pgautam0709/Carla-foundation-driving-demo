# Profile: local_dev
# Purpose: macOS / Linux workstation without a local GPU.
# CARLA server must be running remotely or via Docker.
# Override only the keys that differ from config/default.yaml.

simulation:
  host: "localhost"      # change to remote IP if CARLA is on another machine
  render: false          # headless is faster for dev iteration
  fixed_delta_seconds: 0.1  # 10 Hz — lighter for dev machines

data_collection:
  episodes: 2
  max_frames_per_episode: 200   # short episodes for quick iteration

training:
  epochs: 3
  batch_size: 16
  device: "cpu"          # or "mps" for Apple Silicon
  num_workers: 2
  pin_memory: false

logging:
  level: "DEBUG"
  format: "console"
