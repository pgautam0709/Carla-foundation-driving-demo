# ─────────────────────────────────────────────────────────────────────────────
# Master Configuration — CARLA Foundation Driving Demo
# All values here are defaults. Override using a profile in config/profiles/.
# Config is loaded by src/utils/config.py via: load_config(profile="macos_docker")
#
# Environment variable overrides (always win over YAML):
#   CARLA_HOST              → carla_connection.host
#   CARLA_PORT              → carla_connection.port
#   CARLA_VERSION           → carla_connection.version
#   CARLA_PYTHON_API_PATH   → carla_connection.python_api_path
#   CARLA_DOCKER_IMAGE      → runtime.docker_image (used by start_carla_docker.sh)
# ─────────────────────────────────────────────────────────────────────────────

# ── Project metadata ───────────────────────────────────────────────────────────
project:
  name: "carla-foundation-driving-demo"
  version: "0.1.0"
  phase: 3

# ── CARLA connection ───────────────────────────────────────────────────────────
# Describes WHERE the CARLA server is, not HOW it was started.
# All keys can be overridden by environment variables (see header above).
carla_connection:
  host: "localhost"           # override: CARLA_HOST env var
  port: 2000                  # override: CARLA_PORT env var
  version: "0.9.15"           # override: CARLA_VERSION env var
  timeout_s: 30.0             # seconds to wait for connection
  python_api_path: null       # override: CARLA_PYTHON_API_PATH env var
                              # path to .whl dist dir, e.g.:
                              # /home/user/carla/PythonAPI/carla/dist/

# ── Runtime context ────────────────────────────────────────────────────────────
# Describes HOW CARLA is being run — used by launchers and diagnose.py.
# This repo does not care which mode is active; it only reads carla_connection.
runtime:
  mode: "local"               # docker | local | remote
  docker_image: "carlasim/carla:0.9.15"
  docker_ports: "2000-2002:2000-2002"
  docker_extra_args: ""       # e.g. "--gpus all" on Linux GPU hosts

# ── CARLA Simulation ──────────────────────────────────────────────────────────
# Simulation behaviour settings — independent of where CARLA runs.
simulation:
  synchronous_mode: true      # always true for deterministic data collection
  fixed_delta_seconds: 0.05   # simulation timestep (20 Hz)
  render: true                # disable for headless server
  map: "Town03"               # CARLA built-in map
  seed: 42                    # random seed for reproducibility
  weather: "ClearNoon"        # CARLA WeatherParameters preset

# ── Ego vehicle ───────────────────────────────────────────────────────────────
vehicle:
  blueprint: "vehicle.lincoln.mkz_2020"
  spawn_index: 0              # spawn point index (-1 = random)
  enable_autopilot: true

# ── Sensors ────────────────────────────────────────────────────────────────────
sensors:
  rgb_camera:
    enabled: true
    width: 640
    height: 480
    fov: 110.0
    # Transform relative to vehicle center (x forward, z up)
    transform:
      x: 1.5
      y: 0.0
      z: 2.4
      pitch: -15.0
      yaw: 0.0
      roll: 0.0

  depth_camera:
    enabled: false            # disabled by default (expensive)
    width: 640
    height: 480
    fov: 110.0
    transform:
      x: 1.5
      y: 0.0
      z: 2.4
      pitch: -15.0
      yaw: 0.0
      roll: 0.0

  semantic_segmentation:
    enabled: false

# ── Data Collection ────────────────────────────────────────────────────────────
data_collection:
  output_dir: "data/raw"
  episodes: 5               # number of collection episodes
  max_frames_per_episode: 2000  # ~100 seconds at 20 Hz
  save_every_n_frames: 1    # save every frame (1 = all)
  compress: true            # gzip compression in HDF5

# ── Expert Data Collection (Phase 2) ──────────────────────────────────────────
# Used by scripts/collect_expert_episode.py and make collect-dry-run.
# This is separate from legacy HDF5 data_collection above.
expert_collection:
  output_dir: "data/raw/episodes"  # episode directories written here
  town: "Town03"                   # default map (overridden by --town)
  route: "routeA"                  # default route label
  ticks: 500                       # default tick count (~25s at 20 Hz)
  camera:
    width: 640
    height: 480
    fov: 110.0
  ego_vehicle: "vehicle.lincoln.mkz_2020"
  fixed_delta_seconds: 0.05        # must match simulation.fixed_delta_seconds

# ── Dataset Engineering (Phase 3) ─────────────────────────────────────────────
# Used by scripts/build_dataset.py, scripts/inspect_dataset.py, and
# make build-dataset / inspect-dataset / dataset-dry-run.
# Reads Phase 2 episode directories and produces a flat, indexed dataset
# ready for a future PyTorch Dataset (not implemented in this phase).
dataset_engineering:
  raw_episodes_dir: "data/raw/episodes"  # source of Phase 2 episodes
  datasets_dir: "data/processed/datasets"  # parent dir; each build gets its own <dataset_id>/ subdirectory
  dataset_id: null                       # null = auto-generate a timestamped ID at build time
  output_dir: null                       # explicit full output path override (bypasses
                                          # datasets_dir/dataset_id when set) — null = use versioned default
  require_valid: true                    # drop episodes that fail EpisodeValidator
  allow_partial_alignment: false         # strict by default: drop misaligned episodes
                                          # rather than silently truncating them
  min_episode_ticks: 1                   # episodes with fewer usable ticks are dropped
  split_seed: 42                         # deterministic split assignment seed
  split_ratios:
    train: 0.8
    val: 0.1
    test: 0.1

  # ── Phase 3b: dataset hardening ──────────────────────────────────────────────
  # Informational only — never excludes an episode or sample. Findings are
  # folded into quality_report.json (outlier/duplicate) or stats.json (histogram).
  outlier_detection:
    enabled: true
    steering_spike_delta: 0.6       # per-tick |Δsteer| above this is flagged
    stuck_throttle_min: 0.9         # throttle at/above this counts as "full throttle"
    stuck_speed_max_kph: 1.0        # speed at/below this counts as "not moving"
    stuck_throttle_min_ticks: 40    # consecutive ticks before it's flagged as stuck
  duplicate_detection:
    enabled: true                   # hash every included frame (adds I/O cost on large datasets)
  steering_histogram_bins: 10       # equal-width bins across [-1.0, 1.0] in stats.json

# ── Training ──────────────────────────────────────────────────────────────────
training:
  data_dir: "data/processed"
  output_dir: "outputs/training"
  model: "bc_cnn_baseline"  # behavioral cloning CNN
  epochs: 50
  batch_size: 64
  learning_rate: 1.0e-4
  lr_scheduler: "cosine"
  val_split: 0.15
  seed: 42
  device: "auto"            # "auto" | "cpu" | "cuda" | "mps"
  num_workers: 4
  pin_memory: true
  log_every_n_steps: 10
  checkpoint_every_n_epochs: 5

# ── Evaluation ─────────────────────────────────────────────────────────────────
evaluation:
  checkpoint: null           # path to checkpoint; null = latest in output_dir
  num_episodes: 10
  max_frames_per_episode: 1000
  metrics:
    - route_completion
    - collision_rate
    - avg_speed_kmh
    - smoothness_jerk

# ── Logging ────────────────────────────────────────────────────────────────────
logging:
  level: "INFO"              # DEBUG | INFO | WARNING | ERROR
  format: "console"          # "console" | "json"
  log_dir: "outputs/logs"
